<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <!-- Interface mínima do popup da extensão -->
  <div class="container">
    <div class="icon-area">
      <button id="toggleBtn" class="toggle-btn" type="button" aria-label="Alternar proteção">
        <img class="toggle-img" src="../Images/ligado.png" alt="Estado da proteção">
      </button>
    </div>
    <div class="counters-area">
      <div class="counter" id="pageCounter">
        <span class="counter-label" aria-label="anúncios bloqueados">Anúncios bloqueados</span>
        <span class="counter-value">0</span>
      </div>
      <div class="counter" id="totalCounter">
        <span class="counter-label" aria-label="total bloqueado">Total bloqueado</span>
        <span class="counter-value">0</span>
      </div>
    </div>
    <div class="topbar">
      <button id="settingsBtn" class="settings-btn" aria-label="Abrir configurações">⚙</button>
    </div>
  </div>

  <div id="confirmationOverlay" class="confirmation-overlay hidden" aria-label="confirmação de desativação">
    <div class="confirmation-dialog">
      <p>tem certeza que quer desativar?</p>
      <div class="confirmation-actions">
        <button id="cancelDisableBtn" class="cancel-btn" type="button" aria-label="cancelar">cancelar</button>
        <button id="confirmDisableBtn" class="disable-btn" type="button" aria-label="confirmar desativação">desativar</button>
      </div>
    </div>
  </div>

  <!-- Script do popup que atualiza estado, acessibilidade e ações do usuário -->
  <script src="popup.js"></script>
</body>
</html>
